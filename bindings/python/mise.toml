[tasks.verify-libpython]
description = "Verify that mise Python provides a shared libpython"
run = "python ../../dev/verify_libpython.py"

[tasks.build]
depends = [":verify-libpython"]
description = "Build and install the Python extension into its virtual environment"
run = "uv run --no-sync maturin develop"

[tasks.sync]
depends = [":verify-libpython"]
description = "Install Python development dependencies"
run = '''uv sync --python "$(command -v python)" --no-managed-python --no-python-downloads --group dev --no-install-project'''

[tasks.install]
description = "Install Python development dependencies and rebuild the extension"
run = [{ task = ":sync" }, { task = ":build" }]

[tasks.build-wheel]
depends = [":sync"]
description = "Build a native Python wheel for local testing"
run = [
  '''python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"''',
  "uv run --no-sync maturin build --out dist -i python",
]

[tasks.install-wheel]
depends = [":build-wheel"]
description = "Install the locally built Python wheel"
run = "uv pip install --no-build --reinstall --find-links dist/ pyiceberg-core"

[tasks.test-wheel]
depends = [":install-wheel"]
description = "Build, install, and test a native Python wheel"
run = "uv run --no-sync pytest"

[tasks.test]
depends = [":verify-libpython"]
description = "Run Python binding tests"
run = "uv run --no-sync pytest"

[tasks.check-format]
description = "Check Python formatting"
run = "ruff format --check ."

[tasks.check-style]
description = "Check Python style"
run = "ruff check ."

[tasks.release-tool-versions]
description = "Print Rust and Python selectors for release builds"
run = '''
#!/usr/bin/env bash
set -euo pipefail

root_config=../../mise.toml
rust_version=$(mise config get --file "$root_config" vars.rust_msrv)
python_version=$(mise config get --file "$root_config" tools.python)
python_minor=${python_version%.*}

printf 'rust=%s\n' "$rust_version"
printf 'python=%s\n' "python$python_minor"
'''
