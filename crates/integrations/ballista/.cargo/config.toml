# ⚠️ TEMPORARY — LOCAL DEV ONLY. REMOVE BEFORE MERGING. ⚠️
#
# Caps parallel build jobs to keep the heavy iceberg-ballista dependency graph
# (DataFusion + Ballista scheduler/executor + Arrow) from OOM-ing low-memory
# machines: 12 concurrent rustc processes against ~15 GB RAM exhausts memory and
# swap and freezes the desktop. Two jobs keeps peak memory manageable.
#
# This is a developer convenience and must NOT land upstream — delete this whole
# .cargo/ directory before opening/merging the PR.
#
# NOTE: cargo reads .cargo/config.toml relative to the invocation directory, so
# this only takes effect when cargo is run from within this crate directory
# (crates/integrations/ballista). Run it from here, e.g.:
#   cd crates/integrations/ballista && cargo test --test distributed_write

[build]
jobs = 2
