name: 'Update Package Version'
description: 'Updates workspace version with a dev timestamp for nightly builds'
inputs:
  timestamp:
    description: 'Timestamp to override to the package version'
    required: true
runs:
  using: "composite"
  steps:
    - name: Install toml-cli
      run: cargo install toml-cli
      shell: bash

    - name: Get and update version
      shell: bash
      env:
        TIMESTAMP: ${{ inputs.timestamp }}
      run: |
        # Read the workspace version
        CURRENT_VERSION=$(cargo metadata --format-version 1 --no-deps -q | jq -r '.packages[0].version')
        NEW_VERSION="${CURRENT_VERSION}.dev${TIMESTAMP}"
        echo "Current version: ${CURRENT_VERSION}"
        echo "New dev version: ${NEW_VERSION}"

        # Update workspace version — maturin reads this via dynamic = ["version"]
        toml set Cargo.toml workspace.package.version "${NEW_VERSION}" > Cargo.toml.tmp
        rm Cargo.toml
        mv Cargo.toml.tmp Cargo.toml
