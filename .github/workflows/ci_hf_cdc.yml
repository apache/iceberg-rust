name: HuggingFace and CDC Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'crates/storage/opendal/**'
      - 'crates/iceberg/src/io/**'
      - 'crates/iceberg/src/spec/table_properties.rs'
      - 'crates/integrations/datafusion/**'
      - 'bindings/python/tests/test_huggingface_and_cdc.py'
      - '.github/workflows/ci_hf_cdc.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The `secrets` context is not available in job-level `if:` conditions, so we
  # read the secret in a step (where `secrets` is allowed) and expose the result
  # as an output. Downstream jobs gate on this output. Without this gate, jobs
  # that reference `secrets.*` directly in `if:` would always be skipped, which
  # GitHub reports as "No jobs were run".
  check-secrets:
    name: Check HF secrets availability
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${HF_TOKEN}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "HF_TOKEN is not available; downstream jobs will be skipped (e.g. PRs from forks)."
          fi

  hf-integration:
    name: HuggingFace Hub integration tests
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-builder

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Rust HF integration tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
          HF_DATASET: ${{ secrets.HF_DATASET }}
        run: |
          cargo test -p iceberg-storage-opendal \
            --features opendal-hf \
            --test file_io_hf_test \
            -- --test-threads=1

  cdc-python:
    name: CDC and HuggingFace Python tests
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: "bindings/python"
          command: build
          args: --out dist -i python3.12

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Install dependencies
        working-directory: "bindings/python"
        run: |
          make install
          uv pip install --no-build --reinstall --find-links dist/ pyiceberg-core

      - name: Run CDC and HuggingFace Python tests
        working-directory: "bindings/python"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: ${{ secrets.HF_DATASET }}
        run: |
          uv run --no-sync pytest tests/test_huggingface_and_cdc.py -v
