name: Website

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/website.yml"
      - "website/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@062dc9e3eab0bad35531417c6bb6c6a7a184764f # v2
        with:
          mdbook-version: "0.4.36"

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        working-directory: website
        run: mdbook build

      - name: Copy asf file
        run: cp .asf.yaml ./website/book/.asf.yaml

      - name: Build API docs
        run: |
          cargo doc --no-deps --workspace --all-features
          cp -r target/doc ./website/book/api

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@47f197a2200bb9de68ba5f48fad1c088eb1c4a32 # v4.0.0
        if: github.event_name == 'push' && github.ref_name == 'main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/book
          publish_branch: gh-pages
