name: Publish

on:
  push:
    tags:
      # Trigger this workflow when tag follows the versioning format: v<major>.<minor>.<patch> OR v<major>.<minor>.<patch>-rc.<release_candidate>
      # Example valid tags: v0.4.0, v0.4.0-rc.1
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write  # Required for crates.io trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get MSRV
        id: get-msrv
        uses: ./.github/actions/get-msrv

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-builder
        with:
          rust-version: ${{ steps.get-msrv.outputs.msrv }}

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish crates
        # Only publish if it's a tag and the tag is not a pre-release
        if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-') }}
        run: cargo publish --workspace --all-features
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Trigger Python packaging after crate publishing completes.
  # Only runs for tag pushes; for manual Python releases, use workflow_dispatch on release_python.yml directly.
  package-python:
    needs: [publish]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
    uses: ./.github/workflows/release_python.yml
    with:
      release_tag: ${{ github.ref_name }}

  # Publish Python wheels to PyPI using trusted publishing.
  # This must be a top-level job (not inside a reusable workflow) so that the
  # OIDC token's workflow ref matches the trusted publisher configured on PyPI.
  # See: https://github.com/pypi/warehouse/issues/11096
  pypi-publish:
    name: Publish Python 🐍 distribution 📦 to PyPI
    needs: [package-python]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyiceberg-core
    permissions:
      id-token: write  # Allows trusted publishing authentication with PyPI
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: bindings/python/dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true
          packages-dir: bindings/python/dist
          verbose: true
