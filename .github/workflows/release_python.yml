name: Publish Python 🐍 distribution 📦 to PyPI

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v0.4.0 or v0.4.0-rc.1)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v0.4.0 or v0.4.0-rc.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    env:
      MISE_RUST_VERSION: "1.94.0"
    outputs:
      cargo-version: ${{ steps.validate.outputs.cargo-version }}
      pep440-version: ${{ steps.validate.outputs.pep440-version }}
      is-rc: ${{ steps.validate.outputs.is-rc }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14
          cache: false
          install_args: "rust@1.94.0 jq@1.8.2"

      - name: Validate release tag
        id: validate
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: mise run python:validate-release-tag "$RELEASE_TAG"

  sdist:
    runs-on: ubuntu-latest
    needs: [validate-release-tag]
    env:
      MISE_RUST_VERSION: "1.94.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14
          cache: false
          install_args: "rust@1.94.0 python@3.12.13"

      - name: Set release candidate package version
        if: ${{ needs.validate-release-tag.outputs.is-rc == 'true' }}
        shell: bash
        env:
          PEP440_VERSION: ${{ needs.validate-release-tag.outputs.pep440-version }}
        run: mise run python:set-package-version "$PEP440_VERSION"

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: "bindings/python"
          command: sdist
          args: -o dist
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: bindings/python/dist

  wheels:
    runs-on: "${{ matrix.os }}"
    needs: [validate-release-tag]
    env:
      MISE_RUST_VERSION: "1.94.0"
    strategy:
      max-parallel: 15
      matrix:
        include:
          - { os: windows-latest }
          - { os: macos-latest, target: "universal2-apple-darwin" }
          - { os: ubuntu-latest, target: "x86_64" }
          - {
              os: ubuntu-latest,
              target: "aarch64",
              manylinux: "manylinux_2_28",
            }
          - { os: ubuntu-latest, target: "armv7l" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14
          cache: false
          install_args: "rust@1.94.0 python@3.12.13 uv@0.9.3"

      - name: Set release candidate package version
        if: ${{ needs.validate-release-tag.outputs.is-rc == 'true' }}
        shell: bash
        env:
          PEP440_VERSION: ${{ needs.validate-release-tag.outputs.pep440-version }}
        run: mise run python:set-package-version "$PEP440_VERSION"

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          RUSTUP_TOOLCHAIN: "1.94.0"
        with:
          rust-toolchain: "1.94.0"
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: "bindings/python"
          command: build
          args: --release -o dist -i python3.12 # Explicitly set interpreter; manylinux containers have multiple Pythons and maturin may pick an older one
      # Verify the wheel is abi3-compatible and installable without building from source.
      # Skipped for cross-compiled targets since they share the same maturin config;
      # if abi3 is broken, the native target build will catch it.
      - name: Verify wheel installs with no build fallback
        if: matrix.target != 'aarch64' && matrix.target != 'armv7l'
        run: mise run python:verify-wheel
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  pypi-publish:
    name: Publish Python 🐍 distribution 📦 to Pypi
    needs: [sdist, wheels]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/pyiceberg-core

    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: bindings/python/dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true
          packages-dir: bindings/python/dist
          verbose: true
