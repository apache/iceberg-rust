name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**'                              # Include all files and directories in the repository by default.
      - '!.github/ISSUE_TEMPLATE/**'      # Exclude files and directories that don't impact tests or code like templates, metadata, and documentation.
      - '!dev/release/**'
      - '!website/**'
      - '!.asf.yml'
      - '!.gitattributes'
      - '!.gitignore'
      - '!CONTRIBUTING.md'
      - '!CHANGELOG.md'
      - '!LICENSE'
      - '!NOTICE'
      - '!README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Check License Header
        uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # v0.8.0

      - name: Check toml format
        run: mise run check-toml

      - name: Cargo format
        run: mise run check-fmt

      - name: Check diff
        run: git diff --exit-code

      - name: Check Cargo.lock is up-to-date
        run: cargo update --workspace --locked

      - name: Cargo Machete
        run: mise run cargo-machete

      - name: Check typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  clippy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Cargo clippy
        run: mise run check-clippy

  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    strategy:
      max-parallel: 15
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build
        run: mise run build

  # Checks each crate individually to catch missing feature declarations that
  # are otherwise masked by Cargo's feature unification across the workspace.
  check_standalone:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Check each crate standalone
        shell: bash
        run: |
          set -euo pipefail
          packages=$(cargo metadata --no-deps --format-version=1 | python -c \
            'import json, sys; print("\n".join(package["name"] for package in json.load(sys.stdin)["packages"]))')
          for pkg in $packages; do
            echo "Checking $pkg..."
            cargo check -p "$pkg" --all-targets
          done

  # Verifies the core iceberg crate compiles without default features, ensuring
  # optional functionality is properly gated behind feature flags.
  build_with_no_default_features:
    needs: lint
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    strategy:
      max-parallel: 15
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build -p iceberg --no-default-features

  tests:
    needs: lint
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    strategy:
      max-parallel: 15
      matrix:
        test-suite:
          - default
          - doc
    name: Tests (${{ matrix.test-suite }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.test-suite }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Start Docker containers
        if: matrix.test-suite == 'default'
        run: mise run docker-up

      - name: Run tests
        shell: bash
        env:
          # HuggingFace Hub integration tests self-skip when these are unset
          # (e.g. PRs from forks); see crates/storage/opendal/tests/file_io_hf_test.rs
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
          HF_DATASET: ${{ secrets.HF_DATASET }}
        run: |
          if [ "${{ matrix.test-suite }}" = "default" ]; then
            mise run nextest
          else
            mise run doc-test
          fi

      - name: Stop Docker containers
        if: always() && matrix.test-suite == 'default'
        run: mise run docker-down

  msrv:
    name: Verify MSRV
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.6.14
      - name: Check MSRV
        run: mise run check-msrv
