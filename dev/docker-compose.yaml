# Unified Docker Compose for all integration tests.
# This file combines services needed for REST, HMS, Glue, S3, and GCS tests.
# Start once with: docker compose -f dev/docker-compose.yaml up -d --wait
# Stop with: docker compose -f dev/docker-compose.yaml down -v

networks:
  iceberg_test:

services:
  # =============================================================================
  # MinIO - S3-compatible storage (shared by all tests)
  # =============================================================================
  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    hostname: minio
    networks:
      iceberg_test:
        # Add aliases for virtual-hosted style bucket access
        aliases:
          - icebergdata.minio
          - warehouse.minio
          - bucket1.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO client - creates buckets for tests
  mc:
    depends_on:
      minio:
        condition: service_healthy
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set minio http://minio:9000 admin password;
        /usr/bin/mc mb --ignore-existing minio/icebergdata;
        /usr/bin/mc mb --ignore-existing minio/warehouse;
        /usr/bin/mc mb --ignore-existing minio/bucket1;
        /usr/bin/mc policy set public minio/icebergdata;
        /usr/bin/mc policy set public minio/warehouse;
        /usr/bin/mc policy set public minio/bucket1;
        echo 'Buckets created successfully';
        tail -f /dev/null
      "
    networks:
      iceberg_test:

  # =============================================================================
  # REST Catalog - Apache Iceberg REST Catalog
  # =============================================================================
  rest:
    image: apache/iceberg-rest-fixture:1.10.0
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:sqlite:file:/tmp/iceberg_rest_mode=memory
      - CATALOG_WAREHOUSE=s3://icebergdata/demo
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
    networks:
      iceberg_test:
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # =============================================================================
  # Hive Metastore - HMS Catalog
  # =============================================================================
  hive-metastore:
    build:
      context: ./hms
      dockerfile: Dockerfile
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      iceberg_test:
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: "metastore"
      SERVICE_OPTS: "-Dmetastore.warehouse.dir=s3a://warehouse/hive/"
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/9083"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # =============================================================================
  # Moto - AWS Glue Mock for Glue Catalog tests
  # =============================================================================
  moto:
    image: motoserver/moto:5.0.3
    networks:
      iceberg_test:
    ports:
      - "5001:5001"
    environment:
      # Use port 5001 instead of default 5000 to avoid conflict with macOS AirPlay Receiver.
      - MOTO_PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/moto-api/"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # HDFS - single-node NameNode + DataNode for HDFS tests
  # =============================================================================
  # Uses the official apache/hadoop image. Configuration is vendored as
  # static core-site.xml / hdfs-site.xml under dev/hdfs/ (the apache image
  # has no env-var-to-xml translator like the bde2020 images do, so the
  # files are mounted directly into the image's $HADOOP_CONF_DIR).
  #
  # Host networking is required because hdfs-native 0.13.5 connects to the
  # DataNode by IP from `DatanodeIdProto.ip_addr` (not by hostname). On a
  # docker bridge the DN would register with an unroutable bridge IP; host
  # networking lets it bind directly on the host network namespace so the
  # registered address is host-reachable.
  #
  # This works on Linux CI runners. On macOS / Windows Docker Desktop
  # host networking has known issues (e.g. unresolvable VM hostname), so
  # the HDFS integration tests are `#[ignore]`d; CI explicitly opts them
  # in via `cargo nextest --run-ignored=only` (see .github/workflows/ci.yml).
  hdfs-namenode:
    image: apache/hadoop:3.5.0
    network_mode: "host"
    command: ["hdfs", "namenode"]
    environment:
      # First-boot formats /tmp/hadoop-root/dfs/name when it doesn't exist
      # (starter.sh in the image checks this var); matches dfs.namenode.name.dir
      # in dev/hdfs/hdfs-site.xml.
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"
    # Make `InetAddress.getLocalHost()` succeed inside the container even
    # when the host's hostname isn't already in /etc/hosts (e.g. macOS
    # Docker Desktop, where the VM hostname is `docker-desktop`). On Linux
    # CI runners the real hostname resolves via the system /etc/hosts and
    # these entries are harmless extras.
    extra_hosts:
      - "docker-desktop:127.0.0.1"
    volumes:
      - ./hdfs/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./hdfs/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -safemode get | grep -q OFF"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  hdfs-datanode:
    image: apache/hadoop:3.5.0
    network_mode: "host"
    command: ["hdfs", "datanode"]
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    # See hdfs-namenode above for why docker-desktop is mapped here.
    extra_hosts:
      - "docker-desktop:127.0.0.1"
    volumes:
      - ./hdfs/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./hdfs/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro

  # =============================================================================
  # Fake GCS Server - GCS emulator for GCS tests
  # =============================================================================
  gcs-server:
    image: fsouza/fake-gcs-server@sha256:36b0116fae5236e8def76ccb07761a9ca323e476f366a5f4bf449cac19deaf2d
    networks:
      iceberg_test:
    ports:
      - "4443:4443"
    command: --scheme http

  # =============================================================================
  # Spark - Spark with Iceberg for integration tests
  # =============================================================================
  spark-iceberg:
    build:
      context: ./spark
      dockerfile: Dockerfile
    networks:
      iceberg_test:
    depends_on:
      rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    ports:
      - "15002:15002"
      - "4040:4040"
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -an | grep 15002 | grep LISTEN"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Provision service - creates test data via Spark
  provision:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    networks:
      iceberg_test:
    depends_on:
      spark-iceberg:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "uv run /opt/spark/provision.py && touch /tmp/provision_complete && tail -f /dev/null"]
    volumes:
      - ./spark/provision.py:/opt/spark/provision.py:ro
      - uv-cache:/root/.cache/uv
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/provision_complete ]"]
      interval: 2s
      timeout: 2s
      retries: 90
      start_period: 20s

volumes:
  uv-cache:
